<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title> تسجيل الدخول - أحمد وحمدي</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="module" crossorigin src="/assets/main-Dl33upf7.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/auth-guard-DMMO1gWE.js">
    <link rel="stylesheet" crossorigin href="/assets/auth-guard-C6CJ8_8i.css">
  </head>
  <body>
    <div class="auth-screen">
      <div class="auth-card">
        <div class="auth-brand">
          <div class="mark">أ</div>
          <h1>أحمد وحمدي</h1>
          <p>نظام المحاسبة الداخلي</p>
        </div>
        <div class="error-msg" id="error-msg"></div>
        <form id="login-form">
          <div class="field">
            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" required autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn" id="login-btn">دخول</button>
        </form>
      </div>
    </div>
  </body>
</html>
